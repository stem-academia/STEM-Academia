<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>STEM Academia</title>
    <script type="text/javascript">
      // Этот скрипт берет текущий путь и превращает его в параметр запроса,
      // чтобы index.html мог его прочитать и направить React Router куда нужно.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
